<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <h1>Stock Analyzer</h1>
</header>

<section class="search-section">
  <input type="text" id="searchInput" placeholder="Enter stock symbol (TCS)">
  <button onclick="searchStock()">Search</button>
</section>

<section class="content">
  <div class="chart-section">
    <h3>Price Chart (coming next)</h3>
  </div>

  <div class="details-section">
    <h3>Stock Details</h3>
    <div id="stock-card">
      <p>Search a stock to see data</p>
    </div>
  </div>
</section>

<footer class="app-footer">
  Stock Price Project | Built by Nasir
</footer>

<script src="script.js"></script>
</body>
</html>
